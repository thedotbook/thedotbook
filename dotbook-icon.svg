<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep rich amber to warm gold -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    <!-- Shine overlay -->
    <radialGradient id="shine" cx="35%" cy="28%" r="55%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.28" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <!-- Dot glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE040;stop-opacity:0.6" />
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7A3A00" flood-opacity="0.35"/>
    </filter>
    <filter id="dotShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#B06000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Shine -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Book shape -->
  <g filter="url(#shadow)">
    <!-- Book body -->
    <rect x="112" y="96" width="288" height="340" rx="14" ry="14" fill="#1A0A00" opacity="0.85"/>
    <!-- Book spine (left edge highlight) -->
    <rect x="112" y="96" width="36" height="340" rx="14" ry="14" fill="#3D1A00" opacity="0.9"/>
    <rect x="130" y="96" width="18" height="340" fill="#3D1A00" opacity="0.9"/>
    <!-- Page edge lines (right side of book) -->
    <rect x="384" y="104" width="6" height="324" rx="3" fill="#C47A00" opacity="0.4"/>
    <rect x="390" y="108" width="4" height="316" rx="2" fill="#FFB800" opacity="0.25"/>
    <!-- Book cover shine -->
    <rect x="148" y="96" width="252" height="340" rx="10" fill="#2A0E00" opacity="0.5"/>
  </g>

  <!-- Dollar sign / million marker subtle background text -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="180" font-weight="bold"
        text-anchor="middle" fill="#3D1500" opacity="0.18">$</text>

  <!-- DOTS arranged in a 4x3 grid — the signature element -->
  <!-- Row 1 -->
  <circle cx="192" cy="195" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="246" cy="195" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="300" cy="195" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="354" cy="195" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>

  <!-- Row 2 -->
  <circle cx="192" cy="256" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="246" cy="256" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="300" cy="256" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="354" cy="256" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>

  <!-- Row 3 — partial (trailing off to show scale concept) -->
  <circle cx="192" cy="317" r="18" fill="url(#dotGlow)" filter="url(#dotShadow)"/>
  <circle cx="246" cy="317" r="14" fill="url(#dotGlow)" filter="url(#dotShadow)" opacity="0.75"/>
  <circle cx="295" cy="317" r="10" fill="url(#dotGlow)" filter="url(#dotShadow)" opacity="0.45"/>
  <circle cx="334" cy="317" r="6"  fill="url(#dotGlow)" filter="url(#dotShadow)" opacity="0.22"/>

  <!-- "THE DOT BOOK" label at bottom of book -->
  <text x="256" y="388" font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-weight="bold" letter-spacing="3"
        text-anchor="middle" fill="#FFD700" opacity="0.95">THE DOT BOOK</text>

  <!-- Subtle bottom line under label -->
  <line x1="160" y1="396" x2="352" y2="396" stroke="#FFD700" stroke-width="1.5" opacity="0.4"/>

  <!-- Corner glow top-left for brightness pop -->
  <circle cx="80" cy="80" r="120" fill="#FFE000" opacity="0.07"/>
</svg>
